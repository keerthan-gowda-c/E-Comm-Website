{% extends 'base/base.html' %}


{% block content %}
<div class="container py-5">

    <!-- Header -->
    <div class="text-center mb-5">
        <h3 class="fw-bold">Add Product Images</h3>
        <p class="text-white">Upload high-quality images to showcase your product</p>
    </div>

    <!-- Form -->
    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}

        <div class="card border-0 shadow-lg mx-auto p-4" style="max-width: 520px; border-radius: 18px;">

            <!-- Fields -->
            {% for field in form %}
                <div class="mb-4">
                    {% include 'base/includes/basicFormField.html' %}
                </div>
            {% endfor %}

            <!-- Button -->
            <button type="submit" 
                    class="btn btn-dark w-100 py-2 rounded-3 fw-semibold">
                ⬆ Upload Image
            </button>

        </div>
    </form>

</div>
{% endblock %}
