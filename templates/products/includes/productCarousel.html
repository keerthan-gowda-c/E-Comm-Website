<div class="container">
  <div class="row justify-content-center align-items-center">

    

    <!-- CAROUSEL -->
    <div class="col-lg-12  text-center">

      <div id="productCarousel" class="carousel slide" data-bs-ride="carousel">

        <!-- IMAGES -->
        <div class="carousel-inner ">

          {% for img in product.images.all %}
          <div class="carousel-item {% if forloop.first %}active{% endif %}">

            <div class="main-image-box">
              <img src="{{ img.image.url }}" class="product-main__img" data-bs-toggle="modal"
                data-bs-target="#imageModal">
            </div>

            <div>
              {{img.caption}}
            </div>

             {% if user.is_staff %}
  <div class="mt-2 d-flex justify-content-center gap-2">

    <a href="{% url 'edit_product_image' img.pk %}"
       class="btn btn-light btn-sm">
      <i class="bi bi-pencil"></i>
    </a>

    <a href="{% url 'del_product_image' img.pk %}"
       class="btn btn-danger btn-sm">
      <i class="bi bi-trash"></i>
    </a>

  </div>
  {% endif %}

          </div>
          {% endfor %}

        </div>

        <!-- DOT INDICATORS -->
        <div class="carousel-indicators position-static mt-3">

          {% for img in product.images.all %}
          <button type="button" data-bs-target="#productCarousel" data-bs-slide-to="{{ forloop.counter0 }}"
            class="{% if forloop.first %}active{% endif %} carousel-dot">
          </button>
          {% endfor %}

        </div>

      </div>

    </div>

  </div>
</div>
